version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oit1-postgres
    restart: always
    environment:
      POSTGRES_USER: oit1_user
      POSTGRES_PASSWORD: oit1_password
      POSTGRES_DB: oit1_learning_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: oit1-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  python-microservice:
    build:
      context: ./python-microservice
      dockerfile: Dockerfile
    container_name: oit1-python-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    depends_on:
      - redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oit1-dotnet-api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=oit1_learning_db;Username=oit1_user;Password=oit1_password
      - ConnectionStrings__Redis=redis:6379
      - PythonAPI__BaseAddress=http://python-microservice:8000
    depends_on:
      - db
      - redis
      - python-microservice

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oit1-angular-ui
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
