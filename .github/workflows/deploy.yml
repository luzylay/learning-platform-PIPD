name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Angular Application
        run: |
          cd frontend
          npx ng build --configuration=production --base-href /learning-platform-PIPD/

      - name: Duplicate index.html to 404.html for SPA Routing
        run: cp frontend/dist/frontend/browser/index.html frontend/dist/frontend/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist/frontend/browser
          branch: gh-pages
